<!-- Background placeholder SVG for check-in screen -->
<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1D3557;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0E2647;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#061A33;stop-opacity:1" />
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>
  
  <!-- Background gradient -->
  <rect width="100%" height="100%" fill="url(#bg-gradient)"/>
  
  <!-- Grid pattern -->
  <rect width="100%" height="100%" fill="url(#grid)"/>
  
  <!-- Abstract shapes -->
  <circle cx="200" cy="200" r="300" fill="rgba(238, 0, 0, 0.1)" />
  <circle cx="1700" cy="900" r="400" fill="rgba(16, 82, 180, 0.1)" />
  <circle cx="960" cy="540" r="500" fill="rgba(255, 255, 255, 0.02)" />
  
  <!-- Building silhouette -->
  <g fill="rgba(255,255,255,0.05)">
    <rect x="100" y="600" width="200" height="480" rx="4"/>
    <rect x="320" y="500" width="150" height="580" rx="4"/>
    <rect x="490" y="650" width="180" height="430" rx="4"/>
    <rect x="1250" y="550" width="200" height="530" rx="4"/>
    <rect x="1470" y="450" width="160" height="630" rx="4"/>
    <rect x="1650" y="600" width="200" height="480" rx="4"/>
  </g>
  
  <!-- Windows on buildings -->
  <g fill="rgba(238, 0, 0, 0.2)">
    <rect x="130" y="650" width="40" height="50" rx="2"/>
    <rect x="230" y="650" width="40" height="50" rx="2"/>
    <rect x="130" y="720" width="40" height="50" rx="2"/>
    <rect x="350" y="550" width="35" height="45" rx="2"/>
    <rect x="420" y="550" width="35" height="45" rx="2"/>
    <rect x="350" y="620" width="35" height="45" rx="2"/>
  </g>
</svg>
